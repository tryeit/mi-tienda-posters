name: Crear Tienda Automáticamente

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Crear archivo HTML
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>PosterLux - Tienda de Posters</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  :root {
                      --primary: #8B5CF6;
                      --secondary: #EC4899;
                      --dark: #1F2937;
                      --light: #F9FAFB;
                  }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                      background: var(--light);
                      color: var(--dark);
                  }
                  header {
                      background: linear-gradient(135deg, var(--primary), var(--secondary));
                      color: white;
                      padding: 1.5rem;
                      text-align: center;
                  }
                  .logo { font-size: 2rem; font-weight: bold; }
                  .hero {
                      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(236,72,153,0.1));
                      padding: 3rem 1rem;
                      text-align: center;
                  }
                  .hero h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem; }
                  .gallery {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                      gap: 1.5rem;
                      padding: 2rem;
                      max-width: 1200px;
                      margin: 0 auto;
                  }
                  .poster-card {
                      background: white;
                      border-radius: 12px;
                      padding: 1rem;
                      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                      text-align: center;
                  }
                  .poster-image {
                      font-size: 4rem;
                      margin-bottom: 1rem;
                      min-height: 200px;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      background: linear-gradient(135deg, var(--primary), var(--secondary));
                      border-radius: 8px;
                      color: white;
                  }
                  .poster-title { font-weight: bold; margin-bottom: 0.5rem; }
                  .poster-price {
                      font-size: 1.5rem;
                      color: var(--primary);
                      font-weight: bold;
                      margin-bottom: 1rem;
                  }
                  button {
                      width: 100%;
                      padding: 0.8rem;
                      background: var(--primary);
                      color: white;
                      border: none;
                      border-radius: 8px;
                      cursor: pointer;
                      font-weight: bold;
                      transition: background 0.3s;
                  }
                  button:hover { background: var(--secondary); }
                  footer {
                      background: var(--dark);
                      color: white;
                      text-align: center;
                      padding: 2rem;
                      margin-top: 2rem;
                  }
                  @media (max-width: 600px) {
                      .hero h1 { font-size: 1.5rem; }
                      .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
                  }
              </style>
          </head>
          <body>
              <header>
                  <div class="logo">🎨 PosterLux</div>
                  <p>Tu tienda de posters exclusivos</p>
              </header>
              <section class="hero">
                  <h1>Descubre Posters Únicos</h1>
                  <p>Colección exclusiva de diseños modernos y atractivos</p>
              </section>
              <div class="gallery">
                  <div class="poster-card">
                      <div class="poster-image">🌌</div>
                      <div class="poster-title">Aurora Boreal</div>
                      <div class="poster-price">$29.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">🎨</div>
                      <div class="poster-title">Explosión de Color</div>
                      <div class="poster-price">$28.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">⚪</div>
                      <div class="poster-title">Minimalismo Zen</div>
                      <div class="poster-price">$19.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">🚀</div>
                      <div class="poster-title">Sueña en Grande</div>
                      <div class="poster-price">$22.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">🌲</div>
                      <div class="poster-title">Bosque Neblinoso</div>
                      <div class="poster-price">$31.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">🔷</div>
                      <div class="poster-title">Geometría Abstracta</div>
                      <div class="poster-price">$24.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">✨</div>
                      <div class="poster-title">Creatividad Sin Límites</div>
                      <div class="poster-price">$25.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">⛰️</div>
                      <div class="poster-title">Montaña Sagrada</div>
                      <div class="poster-price">$32.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">📐</div>
                      <div class="poster-title">Líneas Limpias</div>
                      <div class="poster-price">$21.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">🏆</div>
                      <div class="poster-title">Éxito Garantizado</div>
                      <div class="poster-price">$23.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">🌀</div>
                      <div class="poster-title">Caos Ordenado</div>
                      <div class="poster-price">$27.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
                  <div class="poster-card">
                      <div class="poster-image">🌊</div>
                      <div class="poster-title">Fondo Marino</div>
                      <div class="poster-price">$26.99</div>
                      <button onclick="alert('Agregado al carrito')">Agregar al Carrito</button>
                  </div>
              </div>
              <footer>
                  <p>&copy; 2024 PosterLux. Todos los derechos reservados.</p>
                  <p>Tienda creada automáticamente con GitHub Actions</p>
              </footer>
          </body>
          </html>
          EOF

      - name: Guardar en repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "✨ Tienda creada automáticamente" || echo "Sin cambios"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Confirmación
        run: echo "✅ ¡Tienda creada exitosamente!"
